# harness-router v0.3 configuration
#
# v0.3 is model-keyed. List the models you want in `priority`, then attach
# one or more subscription CLI routes and optional metered API fallbacks to
# each model.
#
# Generate a real config with:
#
#   harness-router onboard
#
# This file is a hand-written reference for review, automation, and advanced
# users who want to keep the YAML under source control.

priority:
  - claude-opus-4-7
  - gpt-5.4
  - gemini-2.5-pro

# Default model set for `code` with `mode: "fanout"`.
# Omit or leave empty to fan out to every configured model.
mixture_default:
  - claude-opus-4-7
  - gpt-5.4

models:
  claude-opus-4-7:
    subscription:
      - harness: claude_code
        # Optional when the CLI accepts the parent model key as-is.
        # cli_model_override: opus
      - harness: cursor
        # command is optional; the dispatcher resolves the default binary
        # for built-in harnesses when omitted.
        command: cursor-agent
    metered:
      - base_url: https://api.anthropic.com/v1
        api_key: ${ANTHROPIC_API_KEY}

  gpt-5.4:
    subscription:
      - harness: codex
      - harness: copilot
    metered:
      - base_url: https://api.openai.com/v1
        api_key: ${OPENAI_API_KEY}

  gemini-2.5-pro:
    subscription:
      - harness: gemini_cli
      - harness: opencode
    metered:
      - base_url: https://generativelanguage.googleapis.com/v1beta/openai
        api_key: ${GEMINI_API_KEY}

  # Local or third-party OpenAI-compatible endpoint.
  local-llama:
    metered:
      base_url: http://localhost:11434/v1
      api_key: ollama

  # Minimal third-party CLI route. The generic dispatcher runs:
  #
  #   my-ai-cli --model my-tool-model "<prompt>"
  #
  my-tool-model:
    subscription:
      harness: generic_cli
      command: my-ai-cli
      generic_cli:
        modelFlag: --model
        argsBeforePrompt: []
        argsAfterPrompt: []

http:
  bind: 127.0.0.1
  port: 8765
  auth:
    # Loopback is unauthenticated by default. Non-loopback bind addresses
    # force bearer auth on even when this is false.
    required: false
