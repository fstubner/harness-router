version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # Bundle dev-dependency bumps into one PR — they rarely need separate review.
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      # Group OpenTelemetry packages: they're versioned together upstream.
      opentelemetry:
        patterns:
          - "@opentelemetry/*"
        update-types:
          - minor
          - patch
    ignore:
      # Don't churn on Node major bumps; engines field gates them explicitly.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
