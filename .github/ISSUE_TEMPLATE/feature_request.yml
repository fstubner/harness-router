name: Feature request
description: A new capability or change to existing behavior.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation that prompted this. What were you trying to do, and what got in the way?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A concrete sketch of the behavior or API. Code snippets welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why they're worse.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      multiple: true
      options:
        - New harness (add a CLI)
        - New MCP tool
        - New MCP prompt
        - Routing logic
        - Quota / circuit breaker
        - Onboarding (init)
        - Observability
        - CLI ergonomics
        - Documentation
        - Other
    validations:
      required: true
