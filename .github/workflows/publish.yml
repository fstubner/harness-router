name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # for npm provenance

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  publish-npm:
    name: Publish to npm
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Check npm package version
        id: npm-registry
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "$PACKAGE_NAME@$VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$VERSION already exists on npm; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set version from tag
        if: steps.npm-registry.outputs.exists != 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # --allow-same-version makes this idempotent when package.json
          # already carries the tag's version (the common case).
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build
        if: steps.npm-registry.outputs.exists != 'true'
        run: npm run build

      - name: Publish
        if: steps.npm-registry.outputs.exists != 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
